<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TL-SAG Engine Tests</title>
  <style>
    body { font-family: Consolas, monospace; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    #out { white-space: pre-wrap; font-size: 0.85rem; line-height: 1.5; }
    .summary { font-size: 1.1rem; font-weight: bold; margin-bottom: 1rem; }
    .ok { color: #10b981; } .bad { color: #ef4444; }
  </style>
</head>
<body>
  <h1>TL-SAG Engine Unit Tests</h1>
  <div class="summary" id="summary">Running…</div>
  <div id="out"></div>
  <script src="../engine.js?v=0.10.0"></script>
  <script>
    // Mirror console.log into the page so results are visible without devtools.
    const outEl = document.getElementById('out');
    const origLog = console.log.bind(console);
    console.log = function (...args) {
      origLog(...args);
      const line = document.createElement('div');
      const text = args.join(' ');
      line.textContent = text;
      if (text.includes('PASS')) line.className = 'ok';
      if (text.includes('FAIL')) line.className = 'bad';
      outEl.appendChild(line);
    };
  </script>
  <script src="engine.test.js?v=0.10.0"></script>
  <script>
    const r = window.__testResults || { passed: 0, failed: 1 };
    const s = document.getElementById('summary');
    s.textContent = r.failed === 0
      ? `✅ All ${r.passed} tests passed`
      : `❌ ${r.failed} test(s) FAILED (${r.passed} passed)`;
    s.className = 'summary ' + (r.failed === 0 ? 'ok' : 'bad');
  </script>
</body>
</html>
